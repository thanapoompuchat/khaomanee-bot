<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ขาวมณี - จัดการงาน</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;700;800&display=swap');
body { font-family: 'Kanit', sans-serif; background:#FAFAFA; }
.brutal-border { border:3px solid #111; box-shadow:4px 4px 0 #111; }
.tab-active { border-bottom:4px solid #111; font-weight:800; }
.tab-inactive { color:#A1A1AA; }
.task-done-card { background:#F4F4F5; border:2px dashed #D4D4D8; color:#A1A1AA; }
</style>
</head>

<body class="flex flex-col items-center min-h-screen text-[#111]">

<div class="w-full max-w-md bg-white min-h-screen flex flex-col relative">

<div class="flex justify-between items-center p-6 pb-2">
<div class="text-2xl font-bold">←</div>
<div class="text-2xl font-bold">⋮</div>
</div>

<div class="flex gap-6 px-6 text-xl mb-6">
<button onclick="setFilter('all')" id="tab-all" class="tab-active pb-1">All Tasks</button>
<button onclick="setFilter('todo')" id="tab-todo" class="tab-inactive pb-1">Pending</button>
<button onclick="setFilter('done')" id="tab-done" class="tab-inactive pb-1">Done</button>
</div>

<div id="taskList" class="px-6 flex-1 overflow-y-auto space-y-4 pb-32">
<div class="text-center text-gray-400 py-10 font-bold">กำลังโหลดข้อมูล...</div>
</div>

<div class="fixed bottom-0 w-full max-w-md bg-[#111] rounded-t-[2.5rem] p-8 flex justify-between items-center">
<div class="text-white text-sm">
<p>สร้างงานใหม่</p>
<p class="text-[#FBCFE8]">หรือให้ AI สรุปงาน</p>
</div>
<div class="flex gap-2">
<button onclick="triggerAISummary()" id="aiBtn"
class="bg-[#FBCFE8] brutal-border rounded-xl w-12 h-12 font-bold">✨</button>
</div>
</div>
</div>

<!-- MODAL -->
<div id="taskModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50 p-4">
<div class="bg-white rounded-[2rem] w-full max-w-sm p-6 brutal-border flex flex-col max-h-[90vh]">

<h2 id="modalTitle" class="text-2xl font-extrabold mb-4"></h2>

<p id="modalDesc" class="mb-2"></p>
<p><b>เดดไลน์:</b> <span id="modalDeadline"></span></p>
<p><b>คนรับจบ:</b> <span id="modalAssignee"></span></p>

<hr class="my-4">

<div id="progressHistory" class="space-y-2 mb-4"></div>

<div class="flex gap-2">
<input type="text" id="progressInput" placeholder="อัปเดตว่า..."
class="flex-1 brutal-border px-3 py-2">
<button onclick="saveProgress()" id="saveProgressBtn"
class="bg-black text-white brutal-border px-4">ส่ง</button>
</div>

<button onclick="closeModal()" class="mt-4 text-red-500">ปิด</button>

</div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const groupId = urlParams.get('groupId') || '';

let allTasks = [];
let currentFilter = 'all';
let currentOpenTaskId = null;
let currentLineName = '';

/* =============================
   🔹 INIT LINE LIFF
============================= */
async function initLiff() {
    try {
        await liff.init({ liffId: "YOUR_LIFF_ID_HERE" }); // 👈 ใส่ liff id มึง
        if (liff.isLoggedIn()) {
            const profile = await liff.getProfile();
            currentLineName = profile.displayName;
        }
    } catch (err) {
        console.log("LIFF error:", err);
    }
}

/* =============================
   LOAD TASKS
============================= */
async function loadTasks() {
    try {
        const res = await fetch(`/api/tasks?groupId=${groupId}`);
        allTasks = await res.json();
        renderTasks();
    } catch (err) {
        document.getElementById("taskList").innerHTML =
        '<div class="text-red-500 text-center">โหลดไม่สำเร็จ</div>';
    }
}

/* =============================
   RENDER
============================= */
function renderTasks() {
    const box = document.getElementById("taskList");
    box.innerHTML = "";

    const filtered = allTasks.filter(t =>
        currentFilter === "all" ? true : t.status === currentFilter
    );

    filtered.forEach(task => {

        const assignee = task.assignee || "-";

        box.innerHTML += `
        <div class="p-4 brutal-border cursor-pointer"
        onclick="openModal('${task.id}')">
            <b>${task.task_name}</b>
            <div class="text-sm text-gray-600">👤 ${assignee}</div>
        </div>`;
    });
}

/* =============================
   MODAL
============================= */
function openModal(id) {
    const task = allTasks.find(t => String(t.id) === String(id));
    if (!task) return;

    currentOpenTaskId = id;

    document.getElementById("modalTitle").innerText = task.task_name;
    document.getElementById("modalDesc").innerText = task.description || "-";
    document.getElementById("modalDeadline").innerText = task.deadline || "-";
    document.getElementById("modalAssignee").innerText = task.assignee || "-";

    const historyBox = document.getElementById("progressHistory");
    historyBox.innerHTML = "";

    if (task.progress_note) {
        try {
            const history = JSON.parse(task.progress_note);
            history.forEach(h => {
                historyBox.innerHTML += `
                <div class="p-2 bg-pink-50 brutal-border text-sm">
                    <b>${h.name}</b>
                    <div>${h.note}</div>
                </div>`;
            });
        } catch {}
    }

    document.getElementById("taskModal").classList.remove("hidden");
}

function closeModal() {
    document.getElementById("taskModal").classList.add("hidden");
}

/* =============================
   SAVE PROGRESS
============================= */
async function saveProgress() {
    const note = document.getElementById("progressInput").value.trim();
    if (!note) return alert("พิมพ์ก่อน");

    if (!currentLineName) {
        alert("ยังไม่ได้ชื่อจาก LINE");
        return;
    }

    const task = allTasks.find(t => String(t.id) === String(currentOpenTaskId));
    let history = [];

    if (task.progress_note) {
        try { history = JSON.parse(task.progress_note); }
        catch {}
    }

    history.push({
        name: currentLineName,
        note: note,
        date: new Date().toISOString()
    });

    const btn = document.getElementById("saveProgressBtn");
    btn.disabled = true;

    const res = await fetch("/api/update-progress", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            id: currentOpenTaskId,
            progress_note: JSON.stringify(history)
        })
    });

    if (!res.ok) {
        alert("ส่งไม่สำเร็จ");
        btn.disabled = false;
        return;
    }

    document.getElementById("progressInput").value = "";
    await loadTasks();
    openModal(currentOpenTaskId);
    btn.disabled = false;
}

/* =============================
   AI SUMMARY
============================= */
async function triggerAISummary() {
    const btn = document.getElementById("aiBtn");
    btn.innerText = "⏳";

    const res = await fetch("/api/ai-summary", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ groupId })
    });

    const data = await res.json();

    if (!res.ok) {
        alert("AI error: " + (data.error || "unknown"));
    } else {
        alert("ส่งเข้า LINE แล้ว");
    }

    btn.innerText = "✨";
}

/* ============================= */

function setFilter(f){ currentFilter=f; renderTasks(); }

initLiff();
loadTasks();
</script>
</body>
</html>
