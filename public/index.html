<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ขาวมณี - จัดการงาน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;700;800&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #FAFAFA; }
        .brutal-border { border: 3px solid #111; box-shadow: 4px 4px 0px #111; }
        .brutal-border:active { box-shadow: 0px 0px 0px #111; transform: translate(4px, 4px); }
        .tab-active { border-bottom: 4px solid #111; font-weight: 800; color: #111; }
        .tab-inactive { color: #A1A1AA; font-weight: 500; }
        .task-done-card { background-color: #F4F4F5; border: 2px dashed #D4D4D8; color: #A1A1AA; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen text-[#111]">

<div class="w-full max-w-md bg-white min-h-screen flex flex-col relative overflow-hidden">
    
    <div class="flex justify-between items-center p-6 pb-2">
        <div class="text-2xl font-bold tracking-tighter">←</div>
        <div class="text-2xl font-bold tracking-tighter">⋮</div>
    </div>

    <div class="flex gap-6 px-6 text-xl mb-6">
        <button onclick="setFilter('all')" id="tab-all" class="tab-active pb-1">All Tasks</button>
        <button onclick="setFilter('todo')" id="tab-todo" class="tab-inactive pb-1 hover:text-[#111] transition">Pending</button>
        <button onclick="setFilter('done')" id="tab-done" class="tab-inactive pb-1 hover:text-[#111] transition">Done</button>
    </div>

    <div class="flex px-6 mb-6 gap-4">
        <div class="w-12 rounded-full bg-[#FBCFE8]"></div>
        <div class="flex-1 bg-gray-100 rounded-[2rem] h-32 bg-cover bg-center"
             style="background-image: url('https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60');">
        </div>
    </div>

    <div class="px-6 mb-4">
        <h1 class="text-3xl font-extrabold leading-tight">
            Hey, I'm ขาวมณี.<br>มีงานอะไรให้ช่วยไหมเมี๊ยว!
        </h1>
    </div>

    <div id="taskList" class="px-6 flex-1 overflow-y-auto space-y-4 pb-32">
        <div class="text-center text-gray-400 py-10 font-bold">กำลังโหลดข้อมูล... 🐾</div>
    </div>

    <div class="fixed bottom-0 w-full max-w-md bg-[#111] rounded-t-[2.5rem] p-8 pb-10 flex justify-between items-center z-10">
        <div class="text-white text-sm font-medium w-1/2">
            <p>คลิกเพื่อสร้างงานใหม่</p>
            <p class="text-[#FBCFE8]">หรือให้ AI สรุปงานก็ได้นะ!</p>
        </div>
        <div class="flex gap-2">
            <button onclick="triggerAISummary()" class="bg-[#FBCFE8] text-[#111] brutal-border rounded-xl w-12 h-12 flex items-center justify-center font-bold text-xl">✨</button>
            <a href="/add-task.html" id="addTaskLink"
               class="bg-white text-[#111] brutal-border rounded-xl w-12 h-12 flex items-center justify-center font-bold text-2xl">+</a>
        </div>
    </div>
</div>

<div id="taskModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-[2rem] w-full max-w-sm p-6 brutal-border flex flex-col max-h-[90vh]">
        <div class="flex justify-between items-start mb-4">
            <h2 id="modalTitle" class="text-2xl font-extrabold pr-6 leading-tight">ชื่องาน</h2>
            <button onclick="closeModal()" class="text-[#111] font-bold text-2xl">✕</button>
        </div>

        <div class="space-y-4 text-sm mt-4 overflow-y-auto flex-1 pr-1">
            <div>
                <p class="font-bold text-gray-500 mb-1 uppercase text-xs">รายละเอียด</p>
                <p id="modalDesc" class="text-gray-800 text-base font-medium bg-gray-50 p-3 rounded-2xl border-2 border-gray-200"></p>
            </div>

            <div class="flex gap-4">
                <div class="flex-1">
                    <p class="font-bold text-gray-500 mb-1 uppercase text-xs">เดดไลน์</p>
                    <p id="modalDeadline" class="font-bold text-[#111] text-lg mt-1"></p>
                </div>
                <div class="flex-1">
                    <p class="font-bold text-gray-500 mb-1 uppercase text-xs">คนรับจบ</p>
                    <div id="modalAssignee" class="mt-1 flex flex-col gap-1"></div>
                </div>
            </div>

            <hr class="border-2 border-gray-100 my-4">

            <div>
                <label class="block font-bold text-gray-500 mb-2 uppercase text-xs">💬 ประวัติการทำงาน</label>

                <div class="flex flex-col gap-2 bg-gray-50 p-3 rounded-2xl border-2 border-gray-200 brutal-border mb-4">
                    <select id="updaterName" class="brutal-border rounded-xl px-3 py-2 text-sm font-bold bg-white cursor-pointer">
                        <option value="">👤 เลือกชื่อคนอัปเดต...</option>
                    </select>

                    <div class="flex gap-2">
                        <input type="text" id="progressInput" placeholder="อัปเดตว่า..."
                               class="flex-1 brutal-border rounded-xl px-3 py-2 text-sm font-medium bg-white">
                        <button onclick="saveProgress()" id="saveProgressBtn"
                                class="bg-[#111] text-white brutal-border rounded-xl px-4 py-2 font-bold text-sm">
                            ส่ง
                        </button>
                    </div>
                </div>

                <div id="progressHistory" class="max-h-56 overflow-y-auto hidden pb-2"></div>
            </div>

            <div class="pt-2 flex justify-end">
                <button onclick="deleteTask()" class="text-red-500 font-bold border-2 border-red-500 rounded-xl px-4 py-2 hover:bg-red-50 transition">
                    🗑 ลบงานนี้
                </button>
            </div>
        </div>
    </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const groupId = urlParams.get('groupId') || '';
document.getElementById('addTaskLink').href = `/add-task.html?groupId=${groupId}`;

let allTasks = [];
let groupMembers = [];
let currentFilter = 'all';
let currentOpenTaskId = null;

// 🐾 ฟังก์ชันจัดฟอร์แมตวันที่และเวลา
function formatDateTime(isoStr) {
    if (!isoStr) return '';
    const d = new Date(isoStr);
    return d.toLocaleDateString('th-TH', {day: 'numeric', month: 'short'}) + ' ' +
           d.toLocaleTimeString('th-TH', {hour: '2-digit', minute: '2-digit'}) + ' น.';
}

// 🐾 ฟังก์ชันดึง "หน้าที่" ออกมาจากชื่อที่กรอก (เช่น "James (สารบัญ)" จะได้ "สารบัญ")
function getRoleFromName(name, assigneeStr) {
    if (!assigneeStr) return 'ทั่วไป';
    const escapeName = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const match = assigneeStr.match(new RegExp(escapeName + '\\s*\\(([^)]+)\\)'));
    return match ? match[1] : 'ทั่วไป';
}

// 🐾 ฟังก์ชันตกแต่ง Tag ตรงหัวข้อ "คนรับจบ" ให้มีป้ายบอกหน้าที่สวยๆ
function formatAssigneesForModal(assigneeStr) {
    if (!assigneeStr || assigneeStr.trim() === '') return '<span class="text-gray-400 font-medium text-base">-</span>';
    return assigneeStr.split(',').map(item => {
        const match = item.trim().match(/^(.*?)\s*\(([^)]+)\)$/);
        if(match) {
            return `<div class="bg-[#FBCFE8] px-2 py-1.5 rounded-lg inline-block font-bold text-[#111] text-sm shadow-sm">
                ${match[1]} <span class="bg-black text-white px-1.5 py-0.5 rounded-md text-[10px] ml-1 uppercase">${match[2]}</span>
            </div>`;
        }
        return `<div class="bg-[#FBCFE8] px-2 py-1.5 rounded-lg inline-block font-bold text-[#111] text-sm shadow-sm">${item.trim()}</div>`;
    }).join('');
}

// 🐾 สำหรับหน้าการ์ดหลัก
function getDisplayNameWithRole(name, assigneeStr) {
    if (!assigneeStr) return name;
    const escapeName = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const match = assigneeStr.match(new RegExp(escapeName + '\\s*\\(([^)]+)\\)'));
    return match ? `${name} (${match[1]})` : name;
}

async function loadMembers() {
    try {
        const response = await fetch(`/api/members?groupId=${groupId}`);
        groupMembers = await response.json();
        
        const updaterSelect = document.getElementById('updaterName');
        updaterSelect.innerHTML = '<option value="">👤 เลือกชื่อคนอัปเดต...</option>';
        
        groupMembers.forEach(member => {
            updaterSelect.innerHTML += `<option value="${member.display_name}">${member.display_name}</option>`;
        });
    } catch (error) {
        console.error('โหลดรายชื่อไม่สำเร็จเมี๊ยว:', error);
    }
}

async function loadTasks() {
    const response = await fetch(`/api/tasks?groupId=${groupId}`);
    allTasks = await response.json();
    renderTasks();
}

function setFilter(filterType) {
    currentFilter = filterType;
    ['all','todo','done'].forEach(t=>{
        const btn=document.getElementById(`tab-${t}`);
        btn.className=t===filterType?"tab-active pb-1":"tab-inactive pb-1";
    });
    renderTasks();
}

function renderTasks(){
    const taskList=document.getElementById('taskList');
    taskList.innerHTML='';
    const filtered=allTasks.filter(t=>currentFilter==='all'?true:t.status===currentFilter);

    if(filtered.length===0){
        taskList.innerHTML='<div class="text-center text-gray-400 py-10 font-bold">ว่างเปล่า เมี๊ยว~ 💤</div>';
        return;
    }

    filtered.forEach(task=>{
        const isDone=task.status==='done';
        const checkboxState=isDone?'checked':'';

        let latestProgress='';
        if(task.progress_note){
            try{
                const history=JSON.parse(task.progress_note);
                if(Array.isArray(history)&&history.length>0){
                    const last=history[history.length-1];
                    const displayNameWithRole = getDisplayNameWithRole(last.name, task.assignee);
                    const timeStr = formatDateTime(last.date);
                    
                    latestProgress=`<div class="mt-2 bg-[#FBCFE8]/50 text-[#111] p-2.5 rounded-xl border-2 border-pink-200">
                        <div class="flex justify-between items-start mb-0.5">
                            <span class="text-xs font-extrabold text-pink-600">💬 ${displayNameWithRole}</span>
                            <span class="text-[10px] font-bold text-gray-500">${timeStr}</span>
                        </div>
                        <p class="text-sm font-medium leading-tight">${last.note}</p>
                    </div>`;
                }
            }catch{}
        }

        const assigneeLabel=task.assignee?
            `<span class="text-xs font-bold bg-black text-white px-2 py-1 rounded-lg ml-2 line-clamp-1 mt-1 inline-block">${task.assignee}</span>`:'';

        taskList.insertAdjacentHTML('beforeend',`
            <div class="rounded-[1.5rem] p-5 flex gap-4 items-start bg-white brutal-border cursor-pointer hover:bg-gray-50 transition"
                 onclick="openModal('${task.id}')">
                <div onclick="event.stopPropagation()">
                    <input type="checkbox" ${checkboxState}
                           onchange="toggleTaskStatus('${task.id}',this.checked)"
                           class="w-6 h-6 accent-[#111] cursor-pointer">
                </div>
                <div class="flex-1 min-w-0">
                    <h3 class="font-extrabold text-lg leading-tight ${isDone?'line-through text-gray-400':''}">
                        ${task.task_name}
                    </h3>
                    ${assigneeLabel}
                    <div class="text-sm text-gray-500 font-bold mt-1">⏰ ${task.deadline||'ไม่ระบุ'}</div>
                    ${latestProgress}
                </div>
            </div>
        `);
    });
}

function openModal(taskId){
    const task=allTasks.find(t=>String(t.id)===String(taskId));
    if(!task)return;
    currentOpenTaskId=taskId;

    document.getElementById('modalTitle').innerText=task.task_name;
    document.getElementById('modalDesc').innerText=task.description||'-';
    document.getElementById('modalDeadline').innerText=task.deadline||'-';
    
    // 🐾 เรียกใช้ฟังก์ชันที่แปลงหน้าตาป้าย คนรับจบ
    document.getElementById('modalAssignee').innerHTML=formatAssigneesForModal(task.assignee);

    document.getElementById('updaterName').value = '';
    document.getElementById('progressInput').value = '';

    const progressBox=document.getElementById('progressHistory');
    progressBox.innerHTML='';

    if(task.progress_note){
        try{
            const history=JSON.parse(task.progress_note);
            // พลิกเอาใหม่สุดขึ้นก่อน
            const reversedHistory = history.slice().reverse();
            
            // 🐾 จัดกลุ่มประวัติตามหน้าที่
            const grouped = {};
            reversedHistory.forEach(h => {
                const role = getRoleFromName(h.name, task.assignee);
                if (!grouped[role]) grouped[role] = [];
                grouped[role].push(h);
            });

            // 🐾 เรนเดอร์แยกตามกลุ่มหน้าที่
            for (const role in grouped) {
                // สร้างหัวข้อหน้าที่
                progressBox.innerHTML += `
                    <div class="mb-2 mt-4 first:mt-0">
                        <span class="bg-[#111] text-white text-xs font-extrabold px-3 py-1.5 rounded-lg shadow-sm">📌 หน้าที่: ${role}</span>
                    </div>
                `;
                // สร้างกล่องแชทย่อยในหน้าที่นั้นๆ
                grouped[role].forEach(h => {
                    const timeStr = formatDateTime(h.date);
                    progressBox.innerHTML += `
                        <div class="bg-pink-50 p-3 rounded-xl border-2 border-pink-200 mb-2 ml-2">
                            <div class="flex justify-between items-start mb-1 gap-2">
                                <span class="font-extrabold text-[#111] text-sm">${h.name}</span>
                                <span class="text-[10px] text-gray-500 font-bold whitespace-nowrap mt-0.5">${timeStr}</span>
                            </div>
                            <p class="text-sm font-medium text-gray-700">${h.note}</p>
                        </div>
                    `;
                });
            }
            progressBox.classList.remove('hidden');
        }catch(e){ console.error(e) }
    } else {
        progressBox.classList.add('hidden');
    }

    document.getElementById('taskModal').classList.remove('hidden');
}

function closeModal(){
    document.getElementById('taskModal').classList.add('hidden');
}

async function saveProgress(){
    const note=document.getElementById('progressInput').value.trim();
    const name=document.getElementById('updaterName').value;
    if(!note||!name)return alert("เมี๊ยว! กรุณาเลือกชื่อคนอัปเดตและพิมพ์ความคืบหน้าด้วยครับ 🐾");

    const task=allTasks.find(t=>String(t.id)===String(currentOpenTaskId));
    let history=[];
    if(task.progress_note){
        try{ history=JSON.parse(task.progress_note)||[] }catch{}
    }

    history.push({name:name, note:note, date:new Date().toISOString()});

    const btn = document.getElementById('saveProgressBtn');
    btn.disabled = true;
    btn.innerText = '⏳';

    try {
        await fetch('/api/update-progress',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                id:currentOpenTaskId,
                progress_note:JSON.stringify(history),
                // 🚨 สำคัญมาก: ส่งรายชื่อ assignee เดิมกลับไป เพื่อไม่ให้หลังบ้านทับข้อมูลหาย!
                updater_name: task.assignee || name 
            })
        });

        await loadTasks();
        openModal(currentOpenTaskId);
    } catch(err) {
        alert('อัปเดตไม่สำเร็จเมี๊ยว 😿');
    } finally {
        btn.disabled = false;
        btn.innerText = 'ส่ง';
    }
}

async function toggleTaskStatus(id,checked){
    await fetch('/api/update-task',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id:id,status:checked?'done':'todo'})
    });
    loadTasks();
}

async function deleteTask(){
    if(!confirm("จะลบงานนี้จริงๆ หรอเมี๊ยว? 😿")) return;
    await fetch('/api/delete-task',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id:currentOpenTaskId})
    });
    closeModal();
    loadTasks();
}

async function triggerAISummary(){
    const btn = document.querySelector('button[onclick="triggerAISummary()"]');
    btn.innerHTML = '⏳';
    
    await fetch('/api/ai-summary',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({groupId:groupId})
    });
    
    btn.innerHTML = '✨';
    alert("ส่งสรุปเข้า LINE กลุ่มเรียบร้อยแล้วเมี๊ยว! 🚀");
}

loadMembers();
loadTasks();
</script>
</body>
</html>
